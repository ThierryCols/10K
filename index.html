<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ten Thousand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>

    <!-- Colour stains (fixed, decorative) -->
    <div class="stain stain-1" aria-hidden="true"></div>
    <div class="stain stain-2" aria-hidden="true"></div>
    <div class="stain stain-3" aria-hidden="true"></div>

    <!-- SVG symbol library -->
    <svg aria-hidden="true" style="display:none">
      <defs>
        <symbol id="sigil-sun" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="5" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="1.5" fill="currentColor"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(45 16 16)"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(90 16 16)"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(135 16 16)"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(180 16 16)"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(225 16 16)"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(270 16 16)"/>
          <line x1="16" y1="7" x2="16" y2="3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" transform="rotate(315 16 16)"/>
        </symbol>

        <symbol id="sigil-moon" viewBox="0 0 32 32">
          <path d="M22 6 A 12 12 0 1 0 22 26 A 9 9 0 1 1 22 6 Z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="10" cy="12" r="0.8" fill="currentColor"/>
          <circle cx="14" cy="20" r="0.6" fill="currentColor"/>
        </symbol>

        <symbol id="sigil-hanged" viewBox="0 0 32 32">
          <path d="M4 4 L28 4" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M22 4 L22 10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="22" cy="13" r="3" fill="none" stroke="currentColor" stroke-width="1.1"/>
          <path d="M22 16 L22 22 L18 26 M22 22 L26 26" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M22 26 L22 28" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </symbol>

        <symbol id="sigil-skull" viewBox="0 0 32 32">
          <path d="M8 14 C 8 8, 12 5, 16 5 C 20 5, 24 8, 24 14 L 24 20 L 21 22 L 21 25 L 18 25 L 18 22 L 14 22 L 14 25 L 11 25 L 11 22 L 8 20 Z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="12" cy="14" r="1.8" fill="currentColor"/>
          <circle cx="20" cy="14" r="1.8" fill="currentColor"/>
          <path d="M16 17 L15 19 L17 19 Z" fill="currentColor"/>
        </symbol>

        <symbol id="sigil-eye" viewBox="0 0 32 32">
          <path d="M4 16 Q 16 6, 28 16 Q 16 26, 4 16 Z" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="4.5" fill="none" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="16" cy="16" r="1.8" fill="currentColor"/>
          <path d="M16 4 L16 6 M16 26 L16 28 M4 16 L2 16 M28 16 L30 16" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
        </symbol>

        <symbol id="sigil-serpent" viewBox="0 0 32 32">
          <path d="M6 24 Q 10 18, 16 20 Q 22 22, 24 16 Q 26 10, 22 8 Q 18 7, 18 11 Q 18 14, 21 14" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22.5" cy="8.5" r="0.8" fill="currentColor"/>
          <path d="M20.5 7 L19 5.5 M24 7 L25.5 5.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          <path d="M5.5 24.5 L4 26 M6.5 24.5 L7 26" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </symbol>

        <symbol id="sigil-chain" viewBox="0 0 16 16">
          <ellipse cx="5" cy="5" rx="2.5" ry="1.5" transform="rotate(-30 5 5)" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
          <ellipse cx="11" cy="11" rx="2.5" ry="1.5" transform="rotate(-30 11 11)" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
          <ellipse cx="8" cy="8" rx="2.5" ry="1.5" transform="rotate(60 8 8)" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </symbol>

        <symbol id="flourish" viewBox="0 0 80 12">
          <path d="M0 6 Q 10 2, 20 6 T 40 6 T 60 6 T 80 6" stroke="currentColor" stroke-width="0.7" fill="none" opacity="0.6"/>
          <circle cx="40" cy="6" r="1.3" fill="currentColor" opacity="0.7"/>
          <circle cx="20" cy="6" r="0.8" fill="currentColor" opacity="0.5"/>
          <circle cx="60" cy="6" r="0.8" fill="currentColor" opacity="0.5"/>
        </symbol>
      </defs>
    </svg>

    <div x-data="scoreboard" x-cloak>

      <!-- ═══════════════════════════════════════════════ -->
      <!-- SCREEN 1 — The Gathering (player setup)        -->
      <!-- ═══════════════════════════════════════════════ -->
      <div class="screen screen-setup" x-show="!gameBegun">

        <div class="title-block">
          <div class="title-kicker">✦ &nbsp; CHAPTER I &nbsp; ✦</div>
          <div class="title-main">Ten<br>Thousand</div>
          <div class="title-tagline">~ a ledger of souls ~</div>
          <svg class="title-flourish" width="140" height="12" color="var(--gold-deep)">
            <use href="#flourish"/>
          </svg>
        </div>

        <div class="section-content">
          <div class="section-rule">THE GATHERING</div>

          <div class="input-row">
            <input
              class="name-input"
              type="text"
              placeholder="inscribe a name…"
              x-model="newPlayerName"
              @keyup.enter="addPlayer()"
            />
            <button class="btn-enter" @click="addPlayer()">ENTER</button>
          </div>

          <div id="player-list" class="player-list">
            <template x-for="(player, index) in players" :key="player.id">
              <div class="player-row">
                <div class="reorder-stack">
                  <button
                    class="btn-chevron"
                    :class="{ 'btn-chevron--disabled': index === 0 }"
                    :disabled="index === 0"
                    @click="movePlayer(index, -1)"
                    aria-label="Move up"
                  >
                    <svg width="18" height="11" viewBox="0 0 20 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M3 9 Q 10 2, 17 9"/>
                      <circle cx="10" cy="5.5" r="0.6" fill="currentColor" opacity="0.6"/>
                    </svg>
                  </button>
                  <div class="chevron-divider"></div>
                  <button
                    class="btn-chevron"
                    :class="{ 'btn-chevron--disabled': index === players.length - 1 }"
                    :disabled="index === players.length - 1"
                    @click="movePlayer(index, 1)"
                    aria-label="Move down"
                  >
                    <svg width="18" height="11" viewBox="0 0 20 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M3 3 Q 10 10, 17 3"/>
                      <circle cx="10" cy="6.5" r="0.6" fill="currentColor" opacity="0.6"/>
                    </svg>
                  </button>
                </div>
                <div class="player-roman" x-text="['I','II','III','IV','V','VI','VII','VIII'][index]"></div>
                <svg class="player-sigil" width="22" height="22">
                  <use :href="'#sigil-' + player.sigil"/>
                </svg>
                <div class="player-name" x-text="player.name"></div>
                <button class="btn-remove" @click="removePlayer(player.id)" aria-label="Remove">✕</button>
              </div>
            </template>
          </div>
        </div>

        <div class="begin-block" x-show="gameStarted">
          <button class="btn-begin" @click="beginGame()">✦ &nbsp; BEGIN THE GAME &nbsp; ✦</button>
          <div class="begin-caption" x-text="gatheringCaption"></div>
        </div>

      </div>

      <!-- ═══════════════════════════════════════════════ -->
      <!-- SCREEN 2 — The Ledger (scoring)                -->
      <!-- ═══════════════════════════════════════════════ -->
      <div class="screen screen-scoring" x-show="gameBegun && gameStarted">

        <!-- Header row -->
        <div class="scoring-header">
          <button class="btn-abandon" @click="resetScores()">✕ ABANDON</button>
          <div class="scoring-title">✕ · THE LEDGER</div>
          <div class="scoring-turn" x-text="'TURN ' + turnNumber"></div>
        </div>

        <!-- Winner banner -->
        <div class="winner-banner" x-show="winner">
          <span x-text="winner?.name?.toUpperCase()"></span>
          <span class="winner-sub">reaches Ten Thousand — the ledger is sealed.</span>
        </div>

        <!-- Ledger card -->
        <div class="ledger-wrap">
          <div class="ledger-grid" :style="'grid-template-columns: repeat(' + players.length + ', 1fr)'">
            <template x-for="(player, index) in players" :key="player.id">
              <div class="ledger-col" :class="{ 'ledger-col--current': index === currentPlayerIndex && !winner }">

                <div class="col-header">
                  <div class="col-roman" x-text="['I','II','III','IV','V','VI','VII','VIII'][index]"></div>
                  <svg class="col-sigil" width="22" height="22" :class="{ 'col-sigil--jailed': player.inJail }">
                    <use :href="'#sigil-' + player.sigil"/>
                  </svg>
                  <div class="col-name" x-text="player.name" :class="{ 'col-name--current': index === currentPlayerIndex && !winner }"></div>
                  <div class="col-total">
                    <template x-if="player.inJail">
                      <span class="col-bound">
                        <svg width="12" height="12"><use href="#sigil-chain"/></svg>
                        bound
                      </span>
                    </template>
                    <template x-if="!player.inJail">
                      <span x-text="playerScore(index).toLocaleString()"></span>
                    </template>
                  </div>
                </div>

                <div class="col-hairline"></div>

                <template x-for="(row, i) in scoreRows" :key="i">
                  <div class="ledger-cell" x-html="cellHtml(row[index])"></div>
                </template>

              </div>
            </template>
          </div>
        </div>

        <!-- Turn of NAME -->
        <div class="turn-of" x-show="!winner">
          <div class="turn-of-label">the turn of</div>
          <div class="turn-of-name" x-text="currentPlayer?.name?.toUpperCase()"></div>
        </div>

        <!-- Turn score scroll -->
        <div class="turn-scroll" x-show="!winner">
          <div class="turn-scroll-kicker">SCORE OF THE TURN</div>
          <div class="turn-score" x-text="displayTurnScore"></div>
        </div>

        <!-- Increment buttons -->
        <div class="increment-grid" x-show="!winner">
          <button class="btn-increment" @click="addToTurn(100)">+100</button>
          <button class="btn-increment" @click="addToTurn(200)">+200</button>
          <button class="btn-increment" @click="addToTurn(500)">+500</button>
          <button class="btn-increment" @click="addToTurn(1000)">+1000</button>
        </div>

        <!-- Clear + Score -->
        <div class="action-grid" x-show="!winner">
          <button class="btn-clear" @click="turnScore = 0; displayTurnScore = 0">clear</button>
          <button class="btn-score" @click="recordTurn()">✦ SCORE ✦</button>
        </div>

        <!-- Feedback message -->
        <div class="feedback" x-show="lastMessage" x-text="'~ ' + lastMessage + ' ~'"></div>

        <!-- New Game -->
        <button class="btn-new-game" @click="resetScores()">NEW GAME</button>

      </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
